<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ASK JARVIS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;
  font-family:system-ui,-apple-system,'Helvetica Neue',sans-serif;}
body{background:
    radial-gradient(circle at 12% 10%, rgba(255,60,0,.18), transparent 40%),
    radial-gradient(circle at 90% 92%, rgba(255,60,0,.13), transparent 45%),
    linear-gradient(165deg,#1a0803 0%,#280f07 50%,#0f0502 100%);
  display:flex;flex-direction:column;height:100%;position:relative;}
::selection{background:rgba(255,60,0,.35);}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(circle,rgba(255,60,0,.16) 1px,transparent 1px);
  background-size:34px 34px;opacity:.5;}

/* ═══ HEADER ═══════════════════════════════════════════════════════ */
#header{position:relative;z-index:1;flex-shrink:0;display:flex;align-items:center;gap:16px;
  padding:18px 22px;border-bottom:1px solid rgba(255,60,0,.16);
  background:rgba(20,7,3,.35);}
#face-halo{position:relative;width:60px;height:60px;flex-shrink:0;}
#face-halo::before{
  content:"";position:absolute;inset:-8px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,90,28,.35),transparent 70%);
  animation:halo-pulse 3.2s ease-in-out infinite;}
@keyframes halo-pulse{0%,100%{opacity:.5;transform:scale(1);}50%{opacity:.9;transform:scale(1.08);}}
#face-mount{position:relative;width:60px;height:60px;z-index:1;}
#header-text{display:flex;flex-direction:column;gap:3px;}
#header-title{font-size:14px;font-weight:800;letter-spacing:2px;
  background:linear-gradient(90deg,#ff8a66,#ff3c00 55%,#ff3c00);-webkit-background-clip:text;background-clip:text;color:transparent;}
#header-sub{font-size:9.5px;letter-spacing:1px;color:rgba(255,178,155,.55);display:flex;align-items:center;gap:6px;}
#status-dot{width:5px;height:5px;border-radius:50%;background:rgba(120,255,140,.9);
  box-shadow:0 0 6px rgba(120,255,140,.8);animation:dot-blink 2.4s ease-in-out infinite;}
@keyframes dot-blink{0%,100%{opacity:1;}50%{opacity:.4;}}

/* ═══ CHAT ═════════════════════════════════════════════════════════ */
#chat{position:relative;z-index:1;flex:1;overflow-y:auto;padding:22px 26px;
  display:flex;flex-direction:column;gap:18px;}
#chat::-webkit-scrollbar{width:7px;}
#chat::-webkit-scrollbar-track{background:transparent;}
#chat::-webkit-scrollbar-thumb{background:rgba(255,60,0,.25);border-radius:8px;}
#chat::-webkit-scrollbar-thumb:hover{background:rgba(255,60,0,.4);}

@keyframes msg-in{0%{opacity:0;transform:translateY(6px);}100%{opacity:1;transform:translateY(0);}}
.msg{max-width:74%;animation:msg-in .28s ease-out;}
.msg-you{align-self:flex-end;}
.msg-jarvis{align-self:flex-start;}
.msg-label{font-size:9px;letter-spacing:2px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.msg-you .msg-label{color:rgba(255,150,120,.6);justify-content:flex-end;}
.msg-jarvis .msg-label{color:rgba(255,180,150,.7);}
.msg-time{font-weight:400;letter-spacing:.5px;color:rgba(255,150,120,.35);}
.msg-body{font-size:13.5px;line-height:1.65;padding:13px 16px;border-radius:14px;
  white-space:pre-wrap;letter-spacing:.15px;box-shadow:0 4px 16px rgba(0,0,0,.25);}
.msg-you .msg-body{background:linear-gradient(135deg,rgba(255,60,0,.22),rgba(255,60,0,.12));
  border:1px solid rgba(255,60,0,.32);color:rgba(255,235,228,.97);border-bottom-right-radius:4px;}
.msg-jarvis .msg-body{background:rgba(22,8,3,.8);border:1px solid rgba(255,90,28,.22);
  color:rgba(255,228,220,.94);border-bottom-left-radius:4px;}
.msg-jarvis.thinking .msg-body{color:rgba(255,175,150,.65);font-style:italic;display:flex;align-items:center;gap:8px;}
.msg-jarvis.error .msg-body{color:rgba(255,140,130,.9);border-color:rgba(255,90,80,.35);}
.think-dots{display:inline-flex;gap:3px;}
.think-dots span{width:4px;height:4px;border-radius:50%;background:rgba(255,175,150,.75);
  animation:think-bounce 1s ease-in-out infinite;}
.think-dots span:nth-child(2){animation-delay:.15s;}
.think-dots span:nth-child(3){animation-delay:.3s;}
@keyframes think-bounce{0%,60%,100%{opacity:.35;transform:translateY(0);}30%{opacity:1;transform:translateY(-2px);}}

#empty-state{margin:auto;text-align:center;padding:0 40px;}
#empty-icon{font-size:0;margin-bottom:14px;opacity:.5;}
#empty-icon svg{width:38px;height:38px;stroke:rgba(255,140,110,.55);}
#empty-hint{color:rgba(230,169,150,.45);font-size:12.5px;line-height:1.8;letter-spacing:.3px;}

/* ═══ COMPOSER ═════════════════════════════════════════════════════ */
#composer{position:relative;z-index:1;flex-shrink:0;display:flex;gap:10px;
  padding:16px 20px;border-top:1px solid rgba(255,60,0,.16);background:rgba(20,7,3,.35);}
#ask-input-wrap{flex:1;position:relative;}
#ask-input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);
  width:14px;height:14px;stroke:rgba(255,150,120,.4);pointer-events:none;}
#ask-input{width:100%;background:rgba(38,13,6,.75);border:1px solid rgba(255,60,0,.24);
  border-radius:10px;padding:12px 16px 12px 36px;font-size:13px;color:rgba(255,228,220,.95);
  outline:none;letter-spacing:.2px;transition:border-color .2s,box-shadow .2s;}
#ask-input:focus{border-color:rgba(255,60,0,.55);box-shadow:0 0 0 3px rgba(255,60,0,.15);}
#ask-input::placeholder{color:rgba(205,132,110,.4);}
#ask-send{display:flex;align-items:center;gap:8px;padding:0 20px;border-radius:10px;border:none;
  background:linear-gradient(120deg,#ff5722,#ff3c00);color:#1f0902;
  font-size:11.5px;font-weight:700;letter-spacing:1px;cursor:pointer;
  transition:transform .15s,box-shadow .15s;}
#ask-send svg{width:14px;height:14px;}
#ask-send:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,60,0,.45);}
#ask-send:active{transform:translateY(0);}
#ask-send:disabled{opacity:.45;cursor:default;box-shadow:none;transform:none;}
</style>
</head>
<body>
<div id="header">
  <div id="face-halo"><div id="face-mount"></div></div>
  <div id="header-text">
    <div id="header-title">JARVIS</div>
    <div id="header-sub"><span id="status-dot"></span>AT YOUR SERVICE</div>
  </div>
</div>
<div id="chat">
  <div id="empty-state">
    <div id="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l1.6 5.4L19 9l-5.4 1.6L12 16l-1.6-5.4L5 9l5.4-1.6L12 2z"/><path d="M19 15l.7 2.3L22 18l-2.3.7L19 21l-.7-2.3L16 18l2.3-.7L19 15z"/></svg></div>
    <div id="empty-hint">Ask JARVIS anything — questions, quick tasks, or just to talk something through.</div>
  </div>
</div>
<div id="composer">
  <div id="ask-input-wrap">
    <svg id="ask-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    <input id="ask-input" type="text" placeholder="Ask JARVIS..." autocomplete="off" spellcheck="false"/>
  </div>
  <button id="ask-send" onclick="sendAsk()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    ASK
  </button>
</div>

<script src="jarvis-face.js"></script>
<script>
var API_BASE=location.protocol==='file:'?'http://127.0.0.1:5000':'';
var face=JarvisFace.mount(document.getElementById('face-mount'));
var activeAgent='jarvis';
var agentProfile=null;
var agentReady=(function(){
  var saved=null;
  try{ saved=localStorage.getItem('jarvis_current_agent'); }catch(e){}
  activeAgent = saved || 'jarvis';
  return fetch(API_BASE+'/api/agents').then(function(r){return r.json();}).then(function(list){
    agentProfile=list.filter(function(a){return a.id===activeAgent;})[0]||list.filter(function(a){return a.id==='jarvis';})[0];
    if(agentProfile){
      document.getElementById('header-title').textContent=agentProfile.name;
      document.getElementById('header-sub').innerHTML='<span id="status-dot"></span>'+agentProfile.tagline;
      face.setAgent(agentProfile.id, {instant: true});
    }
  }).catch(function(){});
})();
var busy=false;
var chat=document.getElementById('chat');
var input=document.getElementById('ask-input');
var sendBtn=document.getElementById('ask-send');

document.addEventListener('mousemove',function(e){
  var r=document.getElementById('face-mount').getBoundingClientRect();
  var cx=r.left+r.width/2, cy=r.top+r.height/2;
  var dx=Math.max(-1,Math.min(1,(e.clientX-cx)/320));
  var dy=Math.max(-1,Math.min(1,(e.clientY-cy)/240));
  face.lookAt(dx,dy);
});

function escH(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function nowLabel(){
  var d=new Date();
  var h=d.getHours(), m=d.getMinutes();
  return (h<10?'0':'')+h+':'+(m<10?'0':'')+m;
}

function addMessage(role,text,cls,thinking){
  var empty=document.getElementById('empty-state');
  if(empty) empty.remove();
  var div=document.createElement('div');
  div.className='msg msg-'+role+(cls?' '+cls:'');
  var agentName=(agentProfile&&agentProfile.name)||'JARVIS';
  var bodyHtml=thinking
    ? agentName+' is thinking<span class="think-dots"><span></span><span></span><span></span></span>'
    : escH(text);
  div.innerHTML='<div class="msg-label">'+(role==='you'?'YOU':agentName)+'<span class="msg-time">'+nowLabel()+'</span></div>'
    +'<div class="msg-body">'+bodyHtml+'</div>';
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
  return div;
}

function speak(text){
  fetch(API_BASE+'/tts',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({text:text})
  }).then(function(r){
    if(!r.ok) throw new Error('tts failed');
    return r.blob();
  }).then(function(blob){
    var url=URL.createObjectURL(blob);
    var audio=new Audio(url);
    face.setState('speaking');
    audio.onended=function(){ face.setState('idle'); URL.revokeObjectURL(url); };
    audio.onerror=function(){ face.setState('idle'); URL.revokeObjectURL(url); };
    audio.play().catch(function(){ face.setState('idle'); });
  }).catch(function(){ face.setState('idle'); });
}

function sendAsk(){
  var q=input.value.trim();
  if(!q||busy) return;
  input.value='';
  busy=true;
  sendBtn.disabled=true;
  addMessage('you',q);
  var pending=addMessage('jarvis','','thinking',true);
  face.setState('thinking');
  fetch(API_BASE+'/ask',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({message:q,agent:activeAgent})
  }).then(function(res){
    if(!res.ok) throw new Error('bad status');
    return res.json();
  }).then(function(data){
    var answer=(data.choices&&data.choices[0]&&data.choices[0].message&&data.choices[0].message.content)||'(no response)';
    pending.className='msg msg-jarvis';
    pending.querySelector('.msg-body').textContent=answer;
    chat.scrollTop=chat.scrollHeight;
    face.setEmotion(data.emotion||'calm');
    setTimeout(function(){ face.setEmotion('calm'); },8000);
    speak(answer);
  }).catch(function(){
    pending.className='msg msg-jarvis error';
    pending.querySelector('.msg-body').textContent='Something went wrong — try again.';
    face.setState('idle');
    face.setEmotion('concerned');
  }).finally(function(){
    busy=false;
    sendBtn.disabled=false;
    input.focus();
  });
}

input.addEventListener('keydown',function(e){
  if(e.key==='Enter') sendAsk();
});

agentReady.then(function(){
  var params=new URLSearchParams(location.search);
  var q=params.get('q');
  if(q){ input.value=q; sendAsk(); }
  else { input.focus(); }
});
</script>
</body>
</html>
