<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ULTRON STUDIO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;
  font-family:system-ui,-apple-system,sans-serif;}
body{background:
    radial-gradient(circle at 12% 18%, rgba(255,60,0,.30), transparent 42%),
    radial-gradient(circle at 88% 12%, rgba(255,60,0,.26), transparent 45%),
    radial-gradient(circle at 50% 95%, rgba(255,60,0,.16), transparent 50%),
    linear-gradient(165deg,#1a0803 0%,#280f07 50%,#0f0502 100%);}
::selection{background:rgba(255,60,0,.35);}

#topbar{position:fixed;top:0;left:0;right:0;height:28px;z-index:200;
  background:rgba(26,8,3,.72);
  border-bottom:1px solid rgba(255,60,0,.12);
  display:flex;align-items:center;padding:0 10px;gap:0;font-size:12px;
  color:rgba(255,221,210,.88);user-select:none;-webkit-user-select:none;}
#tb-logo{font-size:14px;margin-right:10px;
  background:linear-gradient(90deg,#ff3c00,#ff3c00);-webkit-background-clip:text;background-clip:text;color:transparent;}
#tb-name{font-weight:800;letter-spacing:1.5px;margin-right:16px;
  background:linear-gradient(90deg,#ff8a66,#ff3c00 55%,#ff3c00);-webkit-background-clip:text;background-clip:text;color:transparent;}
#tb-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
#btn-jarvis{padding:3px 11px;border-radius:6px;border:1px solid rgba(255,60,0,.4);
  background:rgba(255,60,0,.08);
  color:rgba(255,175,150,.95);font-size:10px;letter-spacing:.6px;cursor:pointer;margin-right:8px;font-weight:600;
  transition:background .15s,border-color .15s;}
#btn-jarvis:hover{background:rgba(255,60,0,.2);border-color:rgba(255,60,0,.7);}
#btn-home{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);
  border-radius:6px;padding:3px 11px;font-size:10px;letter-spacing:.8px;
  color:rgba(255,205,190,.8);cursor:pointer;transition:background .15s;}
#btn-home:hover{background:rgba(255,255,255,.12);}

#ribbon{position:fixed;top:28px;left:0;right:0;height:40px;z-index:190;
  background:rgba(26,8,3,.55);
  border-bottom:1px solid rgba(255,60,0,.1);
  display:flex;align-items:center;padding:0 10px;gap:10px;}
.rlbl{font-size:10px;color:rgba(255,175,150,.55);letter-spacing:.6px;font-weight:600;}
.rsel{height:26px;background:rgba(255,60,0,.06);border:1px solid rgba(255,60,0,.12);
  color:rgba(255,205,190,.85);border-radius:6px;padding:0 6px;font-size:11px;cursor:pointer;outline:none;
  transition:border-color .15s;}
.rsel:hover{border-color:rgba(255,60,0,.5);}
#btn-clear{height:26px;padding:0 12px;border-radius:6px;border:1px solid rgba(244,114,182,.35);
  background:rgba(244,114,182,.08);color:rgba(249,168,212,.9);font-size:10.5px;cursor:pointer;margin-left:auto;font-weight:600;
  transition:background .15s;}
#btn-clear:hover{background:rgba(244,114,182,.2);}

#main{position:fixed;top:68px;left:0;right:0;bottom:0;overflow-y:auto;padding:26px 20px;}
#promptbar{max-width:900px;margin:0 auto 26px;display:flex;gap:12px;}
#prompt-inp{flex:1;background:rgba(255,60,0,.05);
  border:1px solid rgba(255,60,0,.16);
  border-radius:14px;padding:14px 16px;font-size:13.5px;color:rgba(255,221,210,.95);outline:none;
  resize:none;height:56px;font-family:system-ui,sans-serif;transition:border-color .18s,box-shadow .18s;}
#prompt-inp:focus{border-color:rgba(255,60,0,.75);box-shadow:0 0 0 3px rgba(255,60,0,.15);}
#prompt-inp::placeholder{color:rgba(230,169,150,.45);}
#btn-gen{padding:0 26px;border-radius:14px;border:none;
  background:linear-gradient(120deg,#ff3c00,#ff3c00);
  color:#1f0902;font-size:12.5px;letter-spacing:.8px;cursor:pointer;font-weight:700;
  box-shadow:0 4px 20px rgba(255,60,0,.4);transition:transform .15s,box-shadow .15s;}
#btn-gen:hover{transform:translateY(-1px);box-shadow:0 6px 26px rgba(255,60,0,.55);}
#btn-gen:active{transform:translateY(0);}

#gallery{max-width:1200px;margin:0 auto;display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;}
.gcard{background:rgba(255,60,0,.04);
  border:1px solid rgba(255,60,0,.12);border-radius:16px;
  overflow:hidden;display:flex;flex-direction:column;
  transition:transform .18s,box-shadow .18s,border-color .18s;}
.gcard:hover{transform:translateY(-3px);border-color:rgba(255,60,0,.5);
  box-shadow:0 10px 32px rgba(255,60,0,.28);}
.gcard img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;background:rgba(0,0,0,.3);}
.gcard.pending img,.gcard.failed img{display:none;}
.gcard-status{aspect-ratio:1/1;display:none;align-items:center;justify-content:center;
  text-align:center;padding:14px;font-size:11.5px;color:rgba(255,205,190,.8);font-weight:600;
  background:linear-gradient(120deg,rgba(255,60,0,.2),rgba(255,60,0,.2),rgba(255,60,0,.2));
  background-size:200% 200%;animation:shimmer 2.4s ease-in-out 6;}
.gcard.pending .gcard-status,.gcard.failed .gcard-status{display:flex;}
.gcard.failed .gcard-status{color:rgba(253,164,175,.9);background:rgba(244,63,94,.1);animation:none;}
@keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.gcard-info{padding:10px 12px;display:flex;flex-direction:column;gap:8px;}
.gcard-prompt{font-size:10.5px;color:rgba(250,204,190,.78);line-height:1.45;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.gcard-actions{display:flex;gap:6px;}
.gcard-btn{flex:1;padding:5px;border-radius:7px;border:1px solid rgba(255,60,0,.3);
  background:rgba(255,60,0,.1);color:rgba(255,182,160,.9);font-size:9.5px;cursor:pointer;
  text-align:center;text-decoration:none;font-weight:700;letter-spacing:.4px;transition:background .15s;}
.gcard-btn:hover{background:rgba(255,60,0,.25);}
#empty-hint{max-width:420px;margin:60px auto;text-align:center;color:rgba(235,177,160,.5);font-size:12.5px;line-height:1.7;}
#empty-hint .eh-icon{font-size:34px;display:block;margin-bottom:14px;
  background:linear-gradient(120deg,#ff3c00,#ff3c00,#ff8a66);-webkit-background-clip:text;background-clip:text;color:transparent;}

#jpanel{position:fixed;top:68px;right:0;bottom:0;width:320px;z-index:400;
  background:rgba(17,6,2,.85);
  border-left:1px solid rgba(255,60,0,.14);
  display:flex;flex-direction:column;transform:translateX(100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);overflow:hidden;}
#jpanel.open{transform:translateX(0);}
#jp-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;
  border-bottom:1px solid rgba(255,60,0,.12);flex-shrink:0;}
#jp-title{font-family:monospace;font-size:10px;font-weight:800;letter-spacing:2px;
  background:linear-gradient(90deg,#ff3c00,#ff3c00);-webkit-background-clip:text;background-clip:text;color:transparent;}
#jp-x{width:24px;height:24px;border-radius:6px;border:1px solid rgba(255,60,0,.12);background:transparent;
  color:rgba(240,179,160,.6);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;
  transition:background .15s,color .15s;}
#jp-x:hover{background:rgba(244,63,94,.15);color:rgba(253,164,175,.95);}
#jp-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;}
#jp-msgs::-webkit-scrollbar{width:4px;}
#jp-msgs::-webkit-scrollbar-thumb{background:rgba(255,60,0,.3);border-radius:2px;}
.jm{display:flex;flex-direction:column;gap:3px;max-width:93%;}
.jm.u{align-self:flex-end;align-items:flex-end;}
.jm.b{align-self:flex-start;align-items:flex-start;}
.jm-who{font-size:8px;letter-spacing:1.8px;color:rgba(220,159,140,.5);font-weight:700;}
.jm.b .jm-who{color:rgba(255,60,0,.9);}
.jm-bub{padding:9px 12px;border-radius:12px;font-size:11.5px;line-height:1.6;word-break:break-word;font-family:monospace;}
.jm.u .jm-bub{background:linear-gradient(120deg,rgba(255,60,0,.22),rgba(255,60,0,.18));
  border:1px solid rgba(255,60,0,.3);color:rgba(255,221,210,.95);border-radius:12px 12px 2px 12px;}
.jm.b .jm-bub{background:rgba(255,60,0,.05);border:1px solid rgba(255,60,0,.1);color:rgba(250,204,190,.9);border-radius:12px 12px 12px 2px;}
.jm-dots{display:flex;gap:4px;align-items:center;padding:3px 2px;}
.jm-dots span{width:5px;height:5px;border-radius:50%;background:linear-gradient(120deg,#ff3c00,#ff3c00);animation:jd .9s ease-in-out infinite;}
.jm-dots span:nth-child(2){animation-delay:.18s;}
.jm-dots span:nth-child(3){animation-delay:.36s;}
@keyframes jd{0%,60%,100%{opacity:.2;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
#jp-ft{padding:10px 12px;border-top:1px solid rgba(255,60,0,.12);flex-shrink:0;display:flex;flex-direction:column;gap:7px;}
#jp-inp{width:100%;background:rgba(255,60,0,.05);border:1px solid rgba(255,60,0,.14);border-radius:10px;
  padding:8px 11px;font-size:12px;color:rgba(255,221,210,.95);outline:none;resize:none;height:58px;
  font-family:monospace;transition:border-color .18s;}
#jp-inp:focus{border-color:rgba(255,60,0,.7);}
#jp-inp::placeholder{color:rgba(220,159,140,.45);}
#jp-row{display:flex;gap:6px;}
#jp-send{flex:1;padding:7px;border-radius:9px;border:none;
  background:linear-gradient(120deg,#ff3c00,#ff3c00);
  color:#1f0902;font-size:10.5px;letter-spacing:1px;cursor:pointer;font-family:monospace;font-weight:700;
  transition:transform .15s,box-shadow .15s;}
#jp-send:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(255,60,0,.4);}
</style>
</head>
<body>

<div id="topbar">
  <span id="tb-logo">◈</span>
  <span id="tb-name">STUDIO</span>
  <div id="tb-right">
    <div id="btn-jarvis" onclick="toggleJpanel()">◈ ULTRON</div>
    <div id="btn-home" onclick="goHome()">◈ DESKTOP</div>
  </div>
</div>

<div id="ribbon">
  <span class="rlbl">SIZE</span>
  <select id="sel-w" class="rsel">
    <option value="512">512</option>
    <option value="768">768</option>
    <option value="1024" selected>1024</option>
  </select>
  <span class="rlbl">×</span>
  <select id="sel-h" class="rsel">
    <option value="512">512</option>
    <option value="768">768</option>
    <option value="1024" selected>1024</option>
  </select>
  <button id="btn-clear" onclick="clearGallery()">CLEAR GALLERY</button>
</div>

<div id="main">
  <div id="promptbar">
    <textarea id="prompt-inp" placeholder="Describe the image you want…"></textarea>
    <button id="btn-gen" onclick="generateFromForm()">GENERATE</button>
  </div>
  <div id="gallery"></div>
  <div id="empty-hint"><span class="eh-icon">✦</span>No images yet — describe something above, or ask ULTRON in the chat panel.</div>
</div>

<div id="jpanel">
  <div id="jp-hd"><span id="jp-title">◈ ASK ULTRON</span><button id="jp-x" onclick="toggleJpanel()">✕</button></div>
  <div id="jp-msgs">
    <div class="jm b">
      <span class="jm-who">ULTRON</span>
      <div class="jm-bub">Good day. Describe an image and I'll generate it for you.</div>
    </div>
  </div>
  <div id="jp-ft">
    <textarea id="jp-inp" placeholder="Ask ULTRON anything…"></textarea>
    <div id="jp-row"><button id="jp-send" onclick="sendMsg()">SEND</button></div>
  </div>
</div>

<script>
var GALLERY_KEY='jarvis_studio_gallery';
var gallery=[];

var STALE_PENDING_MS=120000;
function loadGallery(){
  try{ gallery=JSON.parse(localStorage.getItem(GALLERY_KEY)||'[]'); }catch(e){ gallery=[]; }
  var expired=false;
  gallery.forEach(function(item){
    if(item.status==='pending'&&Date.now()-item.ts>STALE_PENDING_MS){ item.status='failed'; expired=true; }
  });
  if(expired) saveGallery();
  renderGallery();
}
function saveGallery(){
  try{ localStorage.setItem(GALLERY_KEY, JSON.stringify(gallery.slice(0,60))); }catch(e){}
}
function clearGallery(){
  gallery=[];
  saveGallery();
  renderGallery();
}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function renderGallery(){
  var g=document.getElementById('gallery');
  var hint=document.getElementById('empty-hint');
  g.innerHTML='';
  hint.style.display=gallery.length?'none':'block';
  gallery.forEach(function(item,idx){
    var card=document.createElement('div');
    card.className='gcard'+(item.status==='pending'?' pending':'')+(item.status==='failed'?' failed':'');
    card.innerHTML=
      '<img src="'+escHtml(item.url)+'" onload="markLoaded('+idx+')" onerror="markFailed('+idx+')">'+
      '<div class="gcard-status">'+(item.status==='failed'?'Generation failed':'Generating…')+'</div>'+
      '<div class="gcard-info">'+
        '<div class="gcard-prompt">'+escHtml(item.prompt)+'</div>'+
        '<div class="gcard-actions">'+
          '<a class="gcard-btn" href="'+escHtml(item.url)+'" download target="_blank" rel="noopener">SAVE</a>'+
        '</div>'+
      '</div>';
    g.appendChild(card);
  });
}
function markLoaded(idx){ if(gallery[idx]){ gallery[idx].status='loaded'; saveGallery(); renderGallery(); } }
function markFailed(idx){ if(gallery[idx]){ gallery[idx].status='failed'; saveGallery(); renderGallery(); } }

function buildPollinationsUrl(prompt,width,height){
  return 'https://image.pollinations.ai/prompt/'+encodeURIComponent(prompt.trim())+'?width='+width+'&height='+height+'&nologo=true';
}
function addToGallery(prompt,url){
  gallery.unshift({prompt:prompt,url:url,status:'pending',ts:Date.now()});
  saveGallery();
  renderGallery();
}
function generateFromForm(){
  var inp=document.getElementById('prompt-inp');
  var prompt=inp.value.trim();
  if(!prompt) return;
  var w=document.getElementById('sel-w').value;
  var h=document.getElementById('sel-h').value;
  addToGallery(prompt, buildPollinationsUrl(prompt,w,h));
  inp.value='';
}

function toggleJpanel(){var p=document.getElementById('jpanel');p.classList.toggle('open');if(p.classList.contains('open'))setTimeout(function(){document.getElementById('jp-inp').focus();},280);}
var _hist=[];
function addMsg(role,text){var b=document.getElementById('jp-msgs');var d=document.createElement('div');d.className='jm '+role;d.innerHTML='<span class="jm-who">'+(role==='u'?'YOU':'ULTRON')+'</span><div class="jm-bub">'+String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/\n/g,'<br>')+'</div>';b.appendChild(d);b.scrollTop=b.scrollHeight;}
function showTyp(){var b=document.getElementById('jp-msgs');var d=document.createElement('div');d.className='jm b';d.id='jp-typ';d.innerHTML='<span class="jm-who">ULTRON</span><div class="jm-bub"><div class="jm-dots"><span></span><span></span><span></span></div></div>';b.appendChild(d);b.scrollTop=b.scrollHeight;return d;}
function execAct(a){
  if(!a) return;
  try{
    if(a.type==='generate'&&a.image_url){
      addToGallery(a.prompt||'(generated)', a.image_url);
    }
  }catch(ex){}
}
async function sendMsg(){
  var inp=document.getElementById('jp-inp');var msg=inp.value.trim();if(!msg)return;
  inp.value='';addMsg('u',msg);_hist.push({role:'user',content:msg});
  var typ=showTyp();
  try{
    var res=await fetch('http://127.0.0.1:5000/jarvis-ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg,context:'',doc_title:'Studio',app:'studio',history:_hist.slice(-8)})});
    var data=await res.json();
    typ.remove();
    var reply=data.response||'No response.';
    addMsg('b',reply);_hist.push({role:'assistant',content:reply});
    if(data.action)execAct(data.action);
  }catch(err){
    typ.remove();
    addMsg('b','ULTRON offline — Flask server not reachable. Connect the Pi backend to enable AI assistance.');
  }
}
function goHome(){
  if(window.self!==window.top){ window.parent.postMessage({jarvisWindow:'close'},'*'); return; }
  window.location.href='desktop.html';
}

document.getElementById('prompt-inp').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();generateFromForm();}
});
document.getElementById('jp-inp').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}
});

loadGallery();
</script>
</body>
</html>
