document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

<!--
  JARVIS Idle Screen — Weather Widget
  Drop this block anywhere before </body> in main_screen.html.
  Self-contained: HTML + CSS + vanilla JS, no build step, no libraries.

  Behavior:
  - Pinned top-right, fixed 160x160px, never grows (no hover-scale, no click-expand)
  - Gets browser geolocation once on load, falls back to Colombo if denied/unavailable
  - Fetches live conditions + today's high/low from Open-Meteo (free, no API key)
  - Maps WMO weather_code -> one of 5 states: sunny / rain / cloudy / snow / storm
  - Blob mascot crossfades between poses when the state changes
  - Refreshes every 15 minutes
-->

<style>
  #jarvis-weather-widget {
    position: fixed;
    top: 24px;
    right: 24px;
    width: 160px;
    height: 160px;
    box-sizing: border-box;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(120, 200, 255, 0.18);
    box-shadow:
      0 8px 24px rgba(0, 0, 0, 0.45),
      0 0 30px rgba(0, 170, 255, 0.06);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 10px;
    font-family: 'Rajdhani', 'Orbitron', sans-serif;
    color: rgba(230, 245, 255, 0.92);
    z-index: 40;
    overflow: hidden;
    /* animation only, this element itself never resizes */
    animation: jw-float 6s ease-in-out infinite;
  }

  @keyframes jw-float {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-3px); }
  }

  #jw-stage {
    position: relative;
    width: 64px;
    height: 64px;
    flex-shrink: 0;
  }

  #jw-stage svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    transform: scale(0.85);
    transition: opacity 0.5s ease, transform 0.5s ease;
    pointer-events: none;
  }

  #jw-stage svg.jw-active {
    opacity: 1;
    transform: scale(1);
  }

  .jw-temp {
    font-size: 22px;
    font-weight: 600;
    line-height: 1;
    letter-spacing: 0.5px;
    color: #eaf6ff;
    text-shadow: 0 0 12px rgba(0, 170, 255, 0.35);
  }

  .jw-range {
    font-size: 11px;
    letter-spacing: 0.5px;
    color: rgba(200, 225, 245, 0.55);
    display: flex;
    gap: 6px;
  }

  .jw-range .hi { color: rgba(255, 170, 120, 0.85); }
  .jw-range .lo { color: rgba(120, 190, 255, 0.85); }

  .jw-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(140, 190, 230, 0.45);
    margin-top: 2px;
  }

  /* ---- mascot idle motion (gentle bob/breathe, shared by all poses) ---- */
  .jw-bob {
    animation: jw-breathe 3.2s ease-in-out infinite;
    transform-origin: center bottom;
  }
  @keyframes jw-breathe {
    0%, 100% { transform: translateY(0) scaleY(1); }
    50%      { transform: translateY(-2px) scaleY(1.02); }
  }

  /* sunny sway */
  .jw-sway { animation: jw-sway 3s ease-in-out infinite; transform-origin: center bottom; }
  @keyframes jw-sway {
    0%, 100% { transform: rotate(-3deg); }
    50%      { transform: rotate(3deg); }
  }

  /* rain shiver */
  .jw-shiver { animation: jw-shiver 0.18s linear infinite; }
  @keyframes jw-shiver {
    0%, 100% { transform: translateX(0); }
    50%      { transform: translateX(0.6px); }
  }

  /* snow hand-rub */
  .jw-rub { animation: jw-rub 0.9s ease-in-out infinite; transform-origin: 32px 40px; }
  @keyframes jw-rub {
    0%, 100% { transform: rotate(-6deg); }
    50%      { transform: rotate(6deg); }
  }

  /* storm flash */
  .jw-flash { animation: jw-flash 2.6s steps(1) infinite; }
  @keyframes jw-flash {
    0%, 92%, 100% { opacity: 0; }
    93%, 96%      { opacity: 0.8; }
  }

  /* falling rain drops */
  .jw-drop { animation: jw-drop-fall 1s linear infinite; }
  .jw-drop:nth-child(2) { animation-delay: 0.3s; }
  .jw-drop:nth-child(3) { animation-delay: 0.6s; }
  @keyframes jw-drop-fall {
    0%   { transform: translateY(-4px); opacity: 0; }
    20%  { opacity: 1; }
    100% { transform: translateY(14px); opacity: 0; }
  }

  /* falling snow */
  .jw-flake { animation: jw-flake-fall 3s linear infinite; }
  .jw-flake:nth-child(2) { animation-delay: 1s; }
  .jw-flake:nth-child(3) { animation-delay: 2s; }
  @keyframes jw-flake-fall {
    0%   { transform: translateY(-6px) translateX(0); opacity: 0; }
    15%  { opacity: 0.9; }
    100% { transform: translateY(18px) translateX(3px); opacity: 0; }
  }

  /* cloud drift for cloudy pose */
  .jw-cloud-drift { animation: jw-cloud-drift 4s ease-in-out infinite; }
  @keyframes jw-cloud-drift {
    0%, 100% { transform: translateX(0); }
    50%      { transform: translateX(2px); }
  }
</style>

<script>
(function () {
  var REFRESH_MS = 15 * 60 * 1000; // 15 minutes
  var FALLBACK_LAT = 6.9271;  // Colombo, Sri Lanka
  var FALLBACK_LON = 79.8612;

  var poses = ['sunny', 'rain', 'cloudy', 'snow', 'storm'];
  var currentPose = null;

  function setPose(pose) {
    if (pose === currentPose) return;
    currentPose = pose;
    poses.forEach(function (p) {
      var el = document.getElementById('jw-pose-' + p);
      if (!el) return;
      if (p === pose) el.classList.add('jw-active');
      else el.classList.remove('jw-active');
    });
    var label = document.getElementById('jw-label');
    var labels = { sunny: 'SUNNY', rain: 'RAINY', cloudy: 'CLOUDY', snow: 'SNOW', storm: 'STORM' };
    if (label) label.textContent = labels[pose] || '';
  }

  // Open-Meteo WMO weather_code -> widget state
  function mapWeatherCode(code) {
    if (code === 0 || code === 1) return 'sunny';
    if (code === 2 || code === 3) return 'cloudy';
    if (code >= 45 && code <= 48) return 'cloudy';
    if (code >= 51 && code <= 67) return 'rain';
    if (code >= 80 && code <= 82) return 'rain';
    if (code >= 71 && code <= 77) return 'snow';
    if (code === 85 || code === 86) return 'snow';
    if (code >= 95 && code <= 99) return 'storm';
    return 'cloudy';
  }

  function renderWeather(data) {
    try {
      var current = data.current;
      var daily = data.daily;
      var temp = Math.round(current.temperature_2m);
      var hi = Math.round(daily.temperature_2m_max[0]);
      var lo = Math.round(daily.temperature_2m_min[0]);
      var state = mapWeatherCode(current.weather_code);

      document.getElementById('jw-temp').textContent = temp + '°';
      document.getElementById('jw-hi').textContent = 'H ' + hi + '°';
      document.getElementById('jw-lo').textContent = 'L ' + lo + '°';
      setPose(state);
    } catch (e) {
      console.error('[jarvis-weather] render failed', e);
    }
  }

  // ---------------------------------------------------------------
  // DEMO MODE — preview-only fallback.
  // If the real Open-Meteo fetch fails (e.g. sandboxed artifact
  // preview with no external network access), this cycles through
  // mock conditions so the widget can be visually reviewed here.
  // On the actual Pi, with real internet access, fetchWeather()
  // above succeeds and this code path never runs.
  // Delete this whole block once no longer needed for previewing.
  // ---------------------------------------------------------------
  var DEMO_MODE = false;
  var demoTimer = null;
  var demoData = [
    { temp: 30, hi: 32, lo: 25, state: 'sunny' },
    { temp: 26, hi: 28, lo: 23, state: 'rain' },
    { temp: 24, hi: 27, lo: 21, state: 'cloudy' },
    { temp: -2, hi: 1,  lo: -5, state: 'snow' },
    { temp: 22, hi: 25, lo: 19, state: 'storm' }
  ];
  var demoIndex = 0;

  function startDemoMode() {
    if (DEMO_MODE) return; // already running
    DEMO_MODE = true;
    var label = document.getElementById('jw-label');
    if (label) label.textContent = 'DEMO';

    function showNext() {
      var d = demoData[demoIndex % demoData.length];
      demoIndex++;
      document.getElementById('jw-temp').textContent = d.temp + '°';
      document.getElementById('jw-hi').textContent = 'H ' + d.hi + '°';
      document.getElementById('jw-lo').textContent = 'L ' + d.lo + '°';
      setPose(d.state);
    }

    showNext();
    demoTimer = setInterval(showNext, 4000);
  }
  // ---------------------------------------------------------------

  function fetchWeather(lat, lon) {
    var url = 'https://api.open-meteo.com/v1/forecast'
      + '?latitude=' + lat
      + '&longitude=' + lon
      + '&current=temperature_2m,weather_code'
      + '&daily=temperature_2m_max,temperature_2m_min'
      + '&timezone=auto';

    fetch(url)
      .then(function (res) { return res.json(); })
      .then(function (data) {
        if (demoTimer) { clearInterval(demoTimer); demoTimer = null; DEMO_MODE = false; }
        renderWeather(data);
      })
      .catch(function (err) {
        console.error('[jarvis-weather] fetch failed, falling back to demo mode', err);
        startDemoMode();
      });
  }

  function init() {
    if (!navigator.geolocation) {
      fetchWeather(FALLBACK_LAT, FALLBACK_LON);
    } else {
      navigator.geolocation.getCurrentPosition(
        function (pos) {
          fetchWeather(pos.coords.latitude, pos.coords.longitude);
        },
        function () {
          // permission denied / unavailable -> fallback location
          fetchWeather(FALLBACK_LAT, FALLBACK_LON);
        },
        { timeout: 8000, maximumAge: 600000 }
      );
    }
  }

  init();
  setInterval(init, REFRESH_MS);
})();
</script>
