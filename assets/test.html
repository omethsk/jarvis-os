<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"></head>
<body style="margin:0;background:#000;display:flex;align-items:center;justify-content:center;width:100vw;height:100vh;">
<div id="info" style="color:#0ff;font-size:48px;font-family:monospace;text-align:center;"></div>
<script>
  var d = document.getElementById('info');
  d.textContent = window.innerWidth + ' x ' + window.innerHeight;
  setInterval(function(){ d.textContent = window.innerWidth + ' x ' + window.innerHeight + ' | ' + screen.width + 'x' + screen.height; }, 500);
</script>
</body>
</html>
